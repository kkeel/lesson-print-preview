name: Build Supply Thumbnails

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Build supply thumbnails from Airtable attachments
        run: node scripts/build-supply-thumbs-from-airtable.mjs
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_CURRICULUM_BASE_ID: ${{ secrets.AIRTABLE_CURRICULUM_BASE_ID }}

      - name: Commit and push images if changed
        run: |
          git config user.name "actions-user"
          git config user.email "actions-user@users.noreply.github.com"
          git add images/supply_covers
          git diff --cached --quiet || git commit -m "Update supply cover thumbnails"
          git push
