name: Build Lesson JSON + Syllabird CSVs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # runs daily at 6am UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Build lesson packet JSON
        run: node scripts/build-lesson-packets-json.mjs
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      - name: Build Syllabird courses CSV
        run: node scripts/syllabird/buildCourses.mjs
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      - name: Build Syllabird assignments CSV
        run: node scripts/syllabird/buildAssignments.mjs

      - name: Build Syllabird combined out CSV
        run: node scripts/syllabird/buildOut.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/
          git add exports/syllabird/

          git commit -m "Update lesson JSON + Syllabird exports" || echo "No changes"

          git push
