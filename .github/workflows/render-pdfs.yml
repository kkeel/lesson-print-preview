name: Render PDFs

on:
  workflow_dispatch:

jobs:
  render-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lesson print repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Render PDFs
        run: npm run render-pdfs

      - name: Checkout course-picker repo
        uses: actions/checkout@v4
        with:
          repository: kkeel/course-picker
          token: ${{ secrets.PLANNING_REPO_TOKEN }}
          path: course-picker

      - name: Copy PDFs into planning repo
        run: |
          mkdir -p course-picker/pdf/lesson-plans
          rm -f course-picker/pdf/lesson-plans/*.pdf
          cp generated-pdfs/*.pdf course-picker/pdf/lesson-plans/

      - name: Commit and push PDFs
        run: |
          cd course-picker
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf/lesson-plans
          git commit -m "Update lesson plan PDFs" || echo "No PDF changes to commit"
          git push
