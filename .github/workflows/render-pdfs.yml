name: Render PDFs

on:
  workflow_dispatch:
    inputs:
      render_mode:
        description: "Render mode"
        required: true
        default: "changed"
        type: choice
        options:
          - changed
          - all

  schedule:
    - cron: "30 6 * * *"

jobs:
  render-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout lesson print repo
        uses: actions/checkout@v5

      - name: Checkout course-picker repo
        uses: actions/checkout@v5
        with:
          repository: kkeel/course-picker
          token: ${{ secrets.PLANNING_REPO_TOKEN }}
          path: course-picker

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Prepare manifest folder
        run: |
          mkdir -p course-picker/pdf/lesson-plans

          if [ ! -f course-picker/pdf/lesson-plans/pdf-manifest.json ]; then
            echo "{}" > course-picker/pdf/lesson-plans/pdf-manifest.json
          fi

      - name: Render PDFs
        env:
          RENDER_MODE: ${{ github.event.inputs.render_mode || 'changed' }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: npm run render-pdfs

      - name: Copy PDFs into planning repo
        run: |
          mkdir -p course-picker/pdf/lesson-plans
          cp generated-pdfs/*.pdf course-picker/pdf/lesson-plans/ || true
          cp generated-pdfs/pdf-manifest.json course-picker/pdf/lesson-plans/

      - name: Copy link pages into planning repo
        run: |
          mkdir -p course-picker/link-pages
          rm -f course-picker/link-pages/*.json
          cp data/link-pages/*.json course-picker/link-pages/
          cp data/link-page-index.json course-picker/link-page-index.json

      - name: Commit and push generated files
        run: |
          cd course-picker

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pdf/lesson-plans
          git add link-pages
          git add link-page-index.json

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
            exit 0
          fi

          git commit -m "Update lesson plan PDFs and link pages"
          git push

      - name: Sync PDF URLs to Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: npm run sync-pdf-urls
