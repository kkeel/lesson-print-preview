name: Build Resource Cover Thumbnails (R3)

on:
  workflow_dispatch:
  schedule:
    - cron: "35 8 * * *"  # daily (adjust)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Verify ImageMagick
        run: |
          which convert
          convert -version
          which magick || true

      - name: Build cover thumbnails from Airtable attachments
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_CURRICULUM_BASE_ID: ${{ secrets.AIRTABLE_CURRICULUM_BASE_ID }}
          ROTATION: 3
        run: |
          node scripts/build-resource-thumbs-from-airtable.mjs

      - name: Commit and push images (if changed)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add images/resource_covers
          if git diff --cached --quiet; then
            echo "No image changes to commit"
          else
            git commit -m "Update resource cover thumbnails (Automated)"
            git push
          fi
